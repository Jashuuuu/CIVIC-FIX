{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 1.5rem; color: var(--text-main);">Forgot Password</h2>
        <p style="text-align: center; margin-bottom: 1.5rem; color: var(--text-muted);">
            Enter your email address and we'll send you a 6-digit OTP to reset your password.
        </p>
        
        <form method="POST">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="name@example.com">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; font-size: 1.1rem; padding: 0.75rem;">
                Send OTP
            </button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.95rem;">
            Remember your password? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 500; text-decoration: none;">Back to login</a>
        </p>
    </div>
</div>
{% endblock %}
