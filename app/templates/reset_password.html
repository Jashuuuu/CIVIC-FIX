{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 1.5rem; color: var(--text-main);">Reset Password</h2>
        <p style="text-align: center; margin-bottom: 1.5rem; color: var(--text-muted);">
            Enter your new password below.
        </p>
        
        <form method="POST">
            <div class="form-group">
                <label class="form-label" for="password">New Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Enter new password" minlength="6">
                <small style="color: var(--text-muted); font-size: 0.85rem;">Password must be at least 6 characters long.</small>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" required placeholder="Confirm new password" minlength="6">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; font-size: 1.1rem; padding: 0.75rem;">
                Reset Password
            </button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.95rem;">
            <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 500; text-decoration: none;">Back to login</a>
        </p>
    </div>
</div>
{% endblock %}
